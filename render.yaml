services:
  # Backend — Rails API
  - type: web
    name: mapass-api
    runtime: ruby
    rootDir: backend
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mapass-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        value: https://ekodgupuhlytnikqgufb.supabase.co
      - key: SERVICE_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_ENV
        value: production
      - key: SENTRY_DSN
        sync: false

  # AI Service — FastAPI
  - type: web
    name: mapass-ai
    runtime: python
    rootDir: ai_service
    # Two-step install: the package itself, then `--upgrade yt-dlp` to
    # always pull the latest extraction patches. TikTok/Instagram change
    # their internal video formats every few weeks and yt-dlp patches
    # within hours — without this upgrade line the deployed yt-dlp slowly
    # ages out and extraction silently degrades to caption-only.
    buildCommand: pip install . && pip install --upgrade yt-dlp
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: RAILS_API_URL
        sync: false
      - key: SERVICE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

staticSites:
  # Frontend — React Static Site
  - name: mapass
    buildCommand: npm install && npm run build
    staticPublishPath: build
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Cache hashed build artefacts (main.<hash>.js etc.) forever —
    # filenames change on every deploy so there's no staleness risk.
    # Everything else stays revalidated on each request (the default).
    headers:
      - path: /static/js/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /static/css/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /static/media/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_AI_SERVICE_URL
        sync: false
      - key: REACT_APP_SUPABASE_URL
        value: https://ekodgupuhlytnikqgufb.supabase.co
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false
      - key: REACT_APP_GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: mapass-db
    databaseName: mapass
