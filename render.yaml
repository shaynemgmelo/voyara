services:
  # Backend — Rails API
  - type: web
    name: voyara-api
    runtime: ruby
    plan: free
    rootDir: backend
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voyara-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SERVICE_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_ENV
        value: production

  # AI Service — FastAPI
  - type: web
    name: voyara-ai
    runtime: python
    plan: free
    rootDir: ai_service
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: RAILS_API_URL
        sync: false
      - key: SERVICE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

staticSites:
  # Frontend — React Static Site
  - type: web
    name: voyara
    buildCommand: npm install && npm run build
    staticPublishPath: build
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_SUPABASE_URL
        value: https://ekodgupuhlytnikqgufb.supabase.co
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false
      - key: REACT_APP_GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: voyara-db
    plan: free
    databaseName: voyara
